<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="manifest" href="../manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>白塔序列 · 首席监考官</title>
    <style>
        :root { --gold-l: #f9e194; --gold-m: #d4a73f; --gold-d: #7a5a12; --black-b: #080808; --red: #8b0000; --glass: rgba(0,0,0,0.88); --border: 2px solid var(--gold-m); }

        #entry-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .tower-logo { font-size: 24px; letter-spacing: 10px; color: var(--gold-l); margin-bottom: 40px; font-weight: 900; text-shadow: 0 0 15px var(--gold-m); text-align: center; }

        .card-frame { position: relative; width: 100%; height: 85vh; border: 1px solid var(--gold-d); border-radius: 15px; overflow: hidden; background: linear-gradient(180deg, #111 0%, #000 100%); box-shadow: inset 0 0 30px rgba(212,167,63,0.1); display: flex; flex-direction: column; justify-content: flex-end; }
        .char-portrait { position: absolute; top: -5%; left: 0; width: 100%; height: 100%; background-size: contain; background-repeat: no-repeat; background-position: center center; z-index: 1; pointer-events: auto; }

        @media screen and (orientation: landscape) { .carousel-container { transform: none !important; justify-content: center; gap: 30px; padding: 10px; } .char-slide { min-width: 40%; height: 95%; padding: 0; } .card-frame { height: 100%; } .nav-hint { display: none; } .char-info-box { padding: 15px; } .char-name { font-size: 24px; } }
        .timer-panel { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 360px; background: var(--glass); border: 1px solid var(--gold-d); padding: 20px; border-radius: 20px; z-index: 500; backdrop-filter: blur(10px); }
        @media screen and (orientation: landscape) { .timer-panel { right: 20px; left: auto; transform: none; width: 240px; bottom: 20px; padding: 15px; } #timer { font-size: 40px !important; } }
        #timer { font-size: 56px; font-family: 'Courier New', monospace; color: var(--gold-l); text-align: center; }
        .star-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin: 10px 0; }
        .star { font-size: 10px; color: #1a1a1a; }
        .star.active { color: var(--gold-m); }
        #gallery-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9500; display: none; align-items: center; justify-content: center; padding: 15px; }
        .gallery-window { background: #080808; border: 1px solid var(--gold-m); width: 100%; max-width: 400px; max-height: 95vh; display: flex; flex-direction: column; overflow-y: auto; overflow-x: hidden; }
        .reward-card { position: relative; width: 100%; aspect-ratio: 3/4; filter: grayscale(1); transition: 1s; flex-shrink: 0; }
        .reward-card.active { filter: grayscale(0); }
        .reward-card img { width: 100%; height: 100%; object-fit: cover; }
        @media screen and (orientation: landscape) { .gallery-window { flex-direction: row; max-width: 90vw; height: 85vh; } .reward-card { width: 50%; height: 100%; aspect-ratio: auto; } .reward-content { width: 50%; padding: 30px; display: flex; flex-direction: column; justify-content: center; } }
        .reward-content { padding: 20px; text-align: left; background: #080808; }
        #mode-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .time-setter { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; border: 1px solid #333; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.02); }

        #v-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
    </style>
</head>
<body>
    <div id="entry-mask">
        <div class="tower-logo">白塔序列 · 首席监考官<br><span style="font-size:10px; letter-spacing:4px; opacity:0.6;">IDENTIFICATION TERMINAL</span></div>

                </div>

                    <div class="char-portrait" style="background-image:url('../lin.png')"></div>
                    <div class="char-info-box">
                        <div class="char-name">林 深</div>
                        <div class="char-desc">“乖一点。等计时器归零，我会给你想要的奖励。”</div>
                        <button class="btn-base" onclick="openMode('lin')">确认接入</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="gallery-overlay" onclick="if(event.target == this) hideGallery()">
        <div class="gallery-window">
            <div id="reward-main" class="reward-card" onclick="playReward()"><img id="reward-img" src=""><div id="lock-badge" style="position:absolute; top:15px; left:15px; background:var(--red); padding:4px 10px; font-size:11px; letter-spacing:1px;">未授权记录</div></div>
            <div class="reward-content">
                <h3 id="gallery-title" style="color:var(--gold-m); margin:0 0 15px 0;"></h3>
                <div id="reward-title-text" style="font-weight:bold; color:var(--gold-l); margin-bottom:10px;"></div>
                <div id="reward-story-text" style="font-size:12px; color:#ccc; line-height:1.7; white-space:pre-line; margin-bottom:20px;"></div>
                <button onclick="hideGallery()" class="btn-base" style="width:100%; border-color:var(--gold-m);">返回特训</button>
            </div>
        </div>
    </div>
    <div id="rule-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9500; display:none; align-items:center; justify-content:center;">
        <div style="background:#0a0a0a; border:1px solid var(--gold-m); padding:30px; width:90%; max-width:380px; text-align:center;">
            <div style="color:var(--gold-m); font-weight:bold; margin-bottom:20px;">特训准则</div>
            <div style="font-size:13px; color:#999; text-align:left; margin-bottom:20px;">• 计时开始后请勿离开页面<br>• 建议横屏放置以获得最佳视野<br><span style="color:var(--gold-l);">• 累计打卡30天解锁绝密档案</span></div>
            <button class="btn-base" style="background:var(--gold-m); color:black;" onclick="startTraining()">进入特训</button>
        </div>
    </div>
    <div id="mode-modal">
        <div style="color:var(--gold-m); margin-bottom:20px; letter-spacing:2px; font-size:14px;">调整特训时长</div>
        <div class="time-setter"><button class="time-btn" onclick="adjTime(-5)">-</button><div id="set-time-display">25:00</div><button class="time-btn" onclick="adjTime(5)">+</button></div>
        <button class="btn-base" onclick="confirmMode(1)">陪伴模式</button>
        <button class="btn-base" style="color:var(--red); border-color:var(--red); margin-top:20px;" onclick="confirmMode(3)">监管模式</button>
    </div>
    <div id="focus-mode" style="display:none; position:relative; width:100%; height:100%;">
        <video id="v-bg" playsinline muted loop style="position:absolute; width:100%; height:100%; object-fit:cover;"></video>
        <div class="timer-panel">
            <div id="timer">25:00</div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin:10px 0;"><button onclick="doSign()" class="btn-base" style="width:70%; margin:0;">DAILY CHECK-IN</button><div onclick="showGallery()" style="font-size:30px;">🎁</div></div>
            <div id="star-g" class="star-grid"></div>
            <button id="ctrl-btn" onclick="toggleTimer()" class="btn-base" style="background:var(--gold-m); color:black;">START</button>
        </div>
    </div>
    <audio id="v-player"></audio><audio id="m-player" loop></audio>
    <script>
        const _0x51d2=["\x57\x61\x73\x65\x64\x61\x32\x30\x32\x36"];
        let st = { man:'', mode:'', active:false, time:1500, initial:1500, endTime:0, curIdx:0, touchX:0 };
        const datingData = {
            'chi': { title: '迟砚：惩戒阈值', story: '“看来平时的特训还是太仁慈了，才让你有胆量在我的眼皮底下，反复试探我的底线。”\n\n他面无表情地用牙齿扯下手套的一角。\n\n“既然这么喜欢走神……接下来的惩罚，我们换一种更‘近’的方式。”', img: '../chi_reward.png' },
            'lin': { title: '林深：沦陷奖励', story: '“嘘……别动。现在，是只属于你一个人的‘奖励时间’。”\n\n他抵在唇边的指尖带着一丝微温。\n\n“这一个月，辛苦了。过来……让我听听，这颗属于我的心，跳得有多快？”', img: '../lin_reward.png' }
        };
        function _0x5a21() { if(document.getElementById('auth-code').value === _0x51d2[0]) { document.getElementById('entry-mask').style.display = 'none'; document.getElementById('selection-ui').style.display = 'block'; document.getElementById('m-player').src = '../bgm_1.mp3'; document.getElementById('m-player').volume = 0.2; document.getElementById('m-player').play().catch(()=>{}); initCarousel(); } else { alert("ACCESS DENIED"); } }
        function adjTime(v) { let m = st.initial / 60 + v; if(m < 5) m = 5; st.initial = m * 60; st.time = st.initial; const ds = (m < 10 ? '0' + m : m) + ':00'; document.getElementById('set-time-display').innerText = ds; document.getElementById('timer').innerText = ds; }
        function playVoice(m) { document.getElementById('v-player').src = `../${m}_select.wav`; document.getElementById('v-player').play(); }
        function initCarousel() { const el = document.getElementById('selection-ui'); const inner = document.getElementById('carousel'); el.addEventListener('touchstart', e => st.touchX = e.touches[0].clientX); el.addEventListener('touchend', e => { if(window.innerHeight > window.innerWidth) { const diff = st.touchX - e.changedTouches[0].clientX; if (Math.abs(diff) > 50) { st.curIdx = diff > 0 ? Math.min(st.curIdx + 1, 1) : Math.max(st.curIdx - 1, 0); inner.style.transform = `translateX(-${st.curIdx * 100}%)`; } } }); }

        function startTraining() { document.getElementById('rule-modal').style.display = 'none'; document.getElementById('selection-ui').style.display = 'none'; document.getElementById('focus-mode').style.display = 'block'; document.getElementById('back-home').style.display = 'block'; const v = document.getElementById('v-bg'); v.src = `../${st.man == 'chi' ? 'shen' : 'lin'}_work.mp4`; v.play(); renderStars(); }

    </script>
</body>
</html>
