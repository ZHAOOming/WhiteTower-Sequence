<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寂静特训 | 首席监考官</title>
    <style>
        :root { --gold-l: #f9e194; --gold-m: #d4a73f; --gold-d: #7a5a12; --red: #8b0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: white; user-select: none; }

        /* --- 顶级入口遮罩 --- */
        #entry-mask {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .start-gate {
            padding: 22px 70px; border: 1px solid var(--gold-m); color: var(--gold-m);
            font-size: 22px; letter-spacing: 12px; cursor: pointer; background: none;
            transition: 0.5s; text-shadow: 0 0 10px rgba(212,167,63,0.5);
        }
        .start-gate:hover { background: var(--gold-m); color: black; box-shadow: 0 0 50px var(--gold-m); }

        /* --- 控制中枢 --- */
        #control-hub { position: fixed; top: 20px; right: 20px; z-index: 5000; background: rgba(0,0,0,0.85); padding: 18px; border: 1px solid var(--gold-m); border-radius: 15px; backdrop-filter: blur(15px); display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .vol-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 12px; color: var(--gold-l); }
        input[type=range] { cursor: pointer; accent-color: var(--gold-m); width: 90px; }
        #music-icon { width: 32px; height: 32px; margin: 0 auto 8px; display: block; cursor: pointer; filter: drop-shadow(0 0 5px var(--gold-m)); }
        #bgm-name { font-size: 10px; color: var(--gold-m); text-align: center; margin-bottom: 8px; width: 90px; opacity: 0.8; }
        .rotating { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- 首页选择区设计还原 --- */
        #selection-ui { width: 100%; height: 100%; background: radial-gradient(circle at center, #181818 0%, #000 100%); position: relative; z-index: 10; }
        .header-section { position: absolute; top: 60px; width: 100%; text-align: center; z-index: 100; }
        .main-title { 
            font-size: 64px; font-weight: 900; letter-spacing: 20px; 
            background: linear-gradient(to bottom, #fff 20%, var(--gold-m) 50%, var(--gold-d) 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(212, 167, 63, 0.3));
        }

        .stage { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: flex-end; gap: 50px; }
        .char-card { position: relative; width: 33vw; height: 88vh; transition: 0.7s cubic-bezier(0.15, 1, 0.3, 1); filter: brightness(0.4); cursor: pointer; }
        .char-card:hover { filter: brightness(1.1); transform: translateY(-20px); width: 35vw; }
        .char-img { width: 100%; height: 100%; background-repeat: no-repeat; background-position: center bottom; background-size: contain; }
        
        /* 人物简介框回归 */
        .char-info { 
            position: absolute; bottom: 180px; left: 20px; right: 20px; 
            background: rgba(0,0,0,0.88); border-left: 5px solid var(--gold-m); 
            padding: 25px; opacity: 0; transition: 0.5s; backdrop-filter: blur(12px); 
            pointer-events: none; border-radius: 0 10px 10px 0;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
        }
        .char-card:hover .char-info { opacity: 1; transform: translateX(10px); }
        .char-name { color: var(--gold-l); font-size: 32px; font-weight: bold; margin-bottom: 10px; letter-spacing: 8px; }
        .char-desc { font-size: 15px; color: #ddd; line-height: 1.8; letter-spacing: 1px; }

        /* --- 时间/模式设置 --- */
        #mode-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.96); backdrop-filter: blur(25px); z-index: 6000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #080808; border: 1px solid var(--gold-m); padding: 50px; width: 360px; text-align: center; box-shadow: 0 0 60px rgba(212,167,63,0.1); }
        .time-setter { display: flex; align-items: center; justify-content: center; gap: 25px; margin-bottom: 35px; }
        .time-btn { width: 45px; height: 45px; border: 1px solid var(--gold-d); color: var(--gold-l); background: none; font-size: 26px; cursor: pointer; transition: 0.3s; }
        .time-btn:hover { border-color: var(--gold-m); background: rgba(212,167,63,0.1); }
        #set-time-display { font-size: 48px; font-weight: bold; color: var(--gold-m); width: 150px; font-family: 'Courier New', monospace; }
        .mode-btn { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: none; border: 1px solid #333; color: #aaa; cursor: pointer; font-weight: bold; font-size: 16px; letter-spacing: 3px; transition: 0.4s; }
        .mode-btn.normal:hover { border-color: var(--gold-m); color: #fff; box-shadow: 0 0 20px rgba(212,167,63,0.2); }
        .mode-btn.special { border-color: var(--red); color: var(--red); }
        .mode-btn.special:hover { background: var(--red); color: white; box-shadow: 0 0 30px var(--red); }

        /* --- 特训页核心 --- */
        #focus-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; opacity: 0; transition: 2s; z-index: 200; }
        #v-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%); object-fit: cover; }
        .timer-panel { position: absolute; top: 150px; right: 60px; text-align: right; background: rgba(0,0,0,0.65); padding: 40px; border-radius: 25px; border: 1px solid var(--gold-m); backdrop-filter: blur(20px); width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        #timer { font-size: 90px; font-weight: bold; color: var(--gold-l); font-family: 'Courier New', monospace; text-shadow: 0 0 20px rgba(249,225,148,0.3); }
        .signin-box { margin-top: 30px; border-top: 1px solid rgba(212,167,63,0.3); padding-top: 20px; }
        .star-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; margin: 15px 0; }
        .star { font-size: 20px; color: #1a1a1a; text-align: center; transition: 0.5s; }
        .star.active { color: var(--gold-m); text-shadow: 0 0 15px var(--gold-m); transform: scale(1.3); }
        .ctrl-btn { width: 100%; margin-top: 25px; background: var(--gold-m); border: none; padding: 22px; font-weight: 900; cursor: pointer; color: black; letter-spacing: 8px; font-size: 18px; transition: 0.3s; }
        .ctrl-btn:hover { background: var(--gold-l); transform: scale(1.02); }
    </style>
</head>
<body onclick="initSystem()">

    <div id="entry-mask">
        <h1 style="color:var(--gold-l); letter-spacing:18px; margin-bottom:50px; font-weight:900;">首席监考官·沉浸特训</h1>
        <button class="start-gate" onclick="initSystem()">开启感官链接</button>
    </div>

    <div id="control-hub">
        <div id="bgm-name">BGM 1</div>
        <svg id="music-icon" onclick="toggleBGM(event)" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 18V5L21 3V16" stroke="#f9e194" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="6" cy="18" r="3" stroke="#f9e194" stroke-width="2"/><circle cx="18" cy="16" r="3" stroke="#f9e194" stroke-width="2"/>
        </svg>
        <div class="vol-row"><span>监考官</span><input type="range" min="0" max="1" step="0.1" value="1" oninput="vp.volume=this.value"></div>
        <div class="vol-row"><span>背景音</span><input type="range" min="0" max="1" step="0.1" value="0.2" oninput="mp.volume=this.value"></div>
    </div>

    <div id="selection-ui">
        <div class="header-section">
            <h1 class="main-title">监控自习室</h1>
        </div>
        <div class="stage">
            <div class="char-card" onmouseenter="hoverPlay('chi')" onclick="openSet('chi')">
                <div class="char-img" style="background-image: url('./shen.png');"></div>
                <div class="char-info">
                    <div class="char-name">迟 砚</div>
                    <div class="char-desc">“笔尖停得太久了。如果不想要这双手，我可以帮帮你。”</div>
                </div>
            </div>
            <div class="char-card" onmouseenter="hoverPlay('lin')" onclick="openSet('lin')">
                <div class="char-img" style="background-image: url('./lin.png');"></div>
                <div class="char-info">
                    <div class="char-name">林 深</div>
                    <div class="char-desc">“乖一点。等计时器归零，我会给你想要的奖励。”</div>
                </div>
            </div>
        </div>
    </div>

    <div id="mode-modal">
        <div class="modal-content">
            <div class="time-setter">
                <button class="time-btn" onclick="adjTime(-5)">-</button>
                <div id="set-time-display">25:00</div>
                <button class="time-btn" onclick="adjTime(5)">+</button>
            </div>
            <button onclick="launch(1)" class="mode-btn normal">清醒陪伴模式</button>
            <button onclick="launch(3)" class="mode-btn special">极效监管模式</button>
            <button style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer;" onclick="document.getElementById('mode-modal').style.display='none'">[ 取消 ]</button>
        </div>
    </div>

    <div id="focus-mode">
        <video id="v-bg" playsinline></video>
        <div class="timer-panel">
            <div id="timer">25:00</div>
            <div class="signin-box">
                <button onclick="doSign()" style="width:100%; background:none; border:1px solid var(--gold-m); color:var(--gold-l); padding:12px; cursor:pointer; font-weight:bold; letter-spacing:2px;">DAILY CHECK-IN</button>
                <div class="star-grid" id="star-g"></div>
            </div>
            <button id="ctrl" onclick="toggle()" class="ctrl-btn">START</button>
        </div>
    </div>

    <audio id="v-player"></audio>
    <audio id="m-player"></audio>

    <script>
        const bgmList = ['bgm_1.mp3', 'bgm_2.mp3', 'bgm_3.mp3', 'bgm_4.mp3', 'bgm_5.mp3', 'bgm_6.mp3', 'bgm_7.mp3', 'bgm_8.mp3'];
        let st = { man:'', mode:'', left:1500, active:false, unl:false, checking:false, curBgmIdx: 0, initialTime: 1500 };
        const vp = document.getElementById('v-player');
        const mp = document.getElementById('m-player');
        const video = document.getElementById('v-bg');
        let timer = null; let nextRnd = 0;

        function initSystem() {
            if(st.unl) return; st.unl = true;
            document.getElementById('entry-mask').style.opacity = '0';
            setTimeout(() => { document.getElementById('entry-mask').style.display = 'none'; }, 1000);
            playBGM(0);
            document.getElementById('control-hub').style.display = 'block';
            document.getElementById('music-icon').classList.add('rotating');
        }

        function playBGM(idx) {
            st.curBgmIdx = idx % bgmList.length;
            mp.src = `./${bgmList[st.curBgmIdx]}`;
            mp.volume = 0.2; mp.play().catch(e=>{});
            document.getElementById('bgm-name').innerText = `BGM ${st.curBgmIdx + 1}`;
            mp.onended = () => playBGM(st.curBgmIdx + 1);
        }

        function toggleBGM(e) {
            e.stopPropagation();
            if(!mp.paused) { mp.pause(); document.getElementById('music-icon').classList.remove('rotating'); }
            else { mp.play(); document.getElementById('music-icon').classList.add('rotating'); }
        }

        function adjTime(mins) {
            let cur = st.initialTime / 60; cur += mins;
            if (cur < 5) cur = 5; if (cur > 120) cur = 120;
            st.initialTime = cur * 60; st.left = st.initialTime;
            document.getElementById('set-time-display').innerText = `${cur}:00`;
            document.getElementById('timer').innerText = `${cur}:00`;
        }

        function hoverPlay(m) { if(!st.unl) return; vp.src = `./${m}_select.wav`; vp.play(); }
        function openSet(m) { st.man = m; document.getElementById('mode-modal').style.display = 'flex'; }

        function launch(mode) {
            st.mode = mode;
            document.getElementById('mode-modal').style.display = 'none';
            document.getElementById('selection-ui').style.display = 'none';
            document.getElementById('focus-mode').style.display = 'block';
            setTimeout(() => document.getElementById('focus-mode').style.opacity = '1', 50);
            const res = st.man === 'chi' ? 'shen' : 'lin';
            video.src = `./${res}_start.mp4`; video.play();
            video.onended = () => { video.src = `./${res}_work.mp4`; video.loop = true; video.play(); };
            setNextCheckPoint();
        }

        function setNextCheckPoint() {
            let totalMins = st.initialTime / 60;
            let gap = totalMins <= 30 ? (120 + Math.random() * 300) : (180 + Math.random() * 360);
            nextRnd = st.left - gap;
        }

        function toggle() {
            const btn = document.getElementById('ctrl');
            if(st.active) { clearInterval(timer); btn.innerText = 'RESUME'; st.active = false; }
            else {
                st.active = true; btn.innerText = 'PAUSE';
                if(st.left >= st.initialTime - 5) { 
                    vp.src = `./${st.man}_${st.mode}_start.wav`; vp.play();
                }
                timer = setInterval(() => {
                    if(st.checking) return;
                    st.left--;
                    document.getElementById('timer').innerText = `${Math.floor(st.left/60)}:${(st.left%60).toString().padStart(2,'0')}`;
                    
                    // 查岗逻辑
                    if (st.left <= nextRnd && st.left > 40) { trigger(); setNextCheckPoint(); }
                    
                    // --- 核心改动：倒计时结束 END 语音播报 ---
                    if (st.left <= 0) {
                        clearInterval(timer);
                        st.active = false;
                        st.checking = true; // 锁定状态防止重复触发
                        // 播放 END 台词 (格式：chi_1end.wav)
                        vp.src = `./${st.man}_${st.mode}end.wav`;
                        vp.play();
                        vp.onended = () => {
                            setTimeout(() => location.reload(), 2000); // 播完2秒后刷新
                        }
                    }
                }, 1000);
            }
        }

        function trigger() {
            st.checking = true;
            const res = st.man === 'chi' ? 'shen' : 'lin';
            video.src = `./${res}_look.mp4`; video.loop = false; video.play();
            // 音画瞬间同步
            vp.src = `./${st.man}_${st.mode}mid_${Math.floor(Math.random()*3)+1}.wav`;
            vp.play();
            video.onended = () => {
                video.src = `./${res}_start.mp4`; video.play();
                video.onended = () => { 
                    video.src = `./${res}_work.mp4`; video.loop = true; video.play(); st.checking = false; 
                };
            };
        }

        function doSign() {
            const today = new Date().toDateString();
            if (localStorage.getItem('last_sign_vfinal') === today) { alert("今日特训已打卡。"); return; }
            let count = parseInt(localStorage.getItem('sc_final_v') || 0) + 1;
            localStorage.setItem('sc_final_v', count);
            localStorage.setItem('last_sign_vfinal', today);
            renderS(); vp.src = `./${st.man}_select.wav`; vp.play();
        }
        function renderS() {
            const count = parseInt(localStorage.getItem('sc_final_v') || 0);
            const g = document.getElementById('star-g'); g.innerHTML = '';
            for(let i=0; i<21; i++) g.innerHTML += `<div class="star ${i < count ? 'active' : ''}">✦</div>`;
        }
        renderS();
    </script>
</body>
</html>
