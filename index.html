<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寂静特训 | 首席监考官</title>
    <style>
        :root { --gold-l: #f9e194; --gold-m: #d4a73f; --gold-d: #7a5a12; --red: #8b0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: "PingFang SC", "Microsoft YaHei", sans-serif; color: white; user-select: none; }
        
        /* 强制开启渲染加速，防止卡顿 */
        #v-bg { position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%; transform: translate(-50%, -50%) translateZ(0); object-fit: cover; }

        #entry-mask { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .start-gate { padding: 22px 70px; border: 1px solid var(--gold-m); color: var(--gold-m); font-size: 22px; letter-spacing: 12px; cursor: pointer; background: none; transition: 0.5s; text-shadow: 0 0 10px rgba(212,167,63,0.5); }
        
        #control-hub { position: fixed; top: 20px; right: 20px; z-index: 5000; background: rgba(0,0,0,0.85); padding: 18px; border: 1px solid var(--gold-m); border-radius: 15px; display: none; }
        .vol-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 12px; color: var(--gold-l); }
        #music-icon { width: 32px; height: 32px; cursor: pointer; display: block; margin: 0 auto 10px; }
        .rotating { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #selection-ui { width: 100%; height: 100%; background: radial-gradient(circle at center, #181818 0%, #000 100%); position: relative; z-index: 10; }
        .header-section { position: absolute; top: 60px; width: 100%; text-align: center; z-index: 100; }
        .main-title { font-size: 64px; font-weight: 900; letter-spacing: 20px; background: linear-gradient(to bottom, #fff 20%, var(--gold-m) 50%, var(--gold-d) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stage { display: flex; width: 100vw; height: 100vh; justify-content: center; align-items: flex-end; gap: 40px; }
        .char-card { position: relative; width: 33vw; height: 88vh; transition: 0.6s cubic-bezier(0.15, 1, 0.3, 1); filter: brightness(0.4); cursor: pointer; }
        .char-card:hover { filter: brightness(1.1); transform: translateY(-15px); }
        .char-img { width: 100%; height: 100%; background-repeat: no-repeat; background-position: center bottom; background-size: contain; }
        
        /* 人物简介：确保可见 */
        .char-info { position: absolute; bottom: 180px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); border-left: 5px solid var(--gold-m); padding: 25px; opacity: 0; transition: 0.4s; pointer-events: none; }
        .char-card:hover .char-info { opacity: 1; transform: translateX(10px); }
        .char-name { color: var(--gold-l); font-size: 32px; font-weight: bold; margin-bottom: 8px; }
        .char-desc { font-size: 15px; color: #ddd; line-height: 1.6; }

        #mode-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 6000; display: none; justify-content: center; align-items: center; }
        .modal-content { background: #080808; border: 1px solid var(--gold-m); padding: 50px; width: 340px; text-align: center; }
        .time-setter { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .time-btn { width: 40px; height: 40px; border: 1px solid var(--gold-d); color: var(--gold-l); background: none; font-size: 24px; cursor: pointer; }
        #set-time-display { font-size: 40px; color: var(--gold-m); width: 140px; font-family: monospace; }
        .mode-btn { display: block; width: 100%; padding: 18px; margin-bottom: 15px; background: none; border: 1px solid #333; color: #aaa; cursor: pointer; font-weight: bold; }
        .mode-btn.special { border-color: var(--red); color: var(--red); }

        #focus-mode { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; display: none; opacity: 0; transition: 1s; z-index: 200; }
        .timer-panel { position: absolute; top: 100px; right: 60px; text-align: right; background: rgba(0,0,0,0.7); padding: 35px; border-radius: 20px; border: 1px solid var(--gold-m); width: 300px; }
        #timer { font-size: 80px; font-weight: bold; color: var(--gold-l); font-family: monospace; margin-bottom: 10px; }
        .star-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin: 15px 0; }
        .star { font-size: 18px; color: #1a1a1a; }
        .star.active { color: var(--gold-m); text-shadow: 0 0 8px var(--gold-m); }
        .ctrl-btn { width: 100%; margin-top: 20px; background: var(--gold-m); border: none; padding: 20px; font-weight: 900; cursor: pointer; color: black; letter-spacing: 5px; }

        @media screen and (max-width: 768px) {
            .main-title { font-size: 36px; letter-spacing: 10px; }
            .stage { gap: 10px; padding-bottom: 30px; }
            .char-card { width: 48vw; height: 70vh; filter: brightness(0.6); }
            .char-info { opacity: 1 !important; bottom: 50px; padding: 12px; left: 5px; right: 5px; }
            .char-name { font-size: 18px; }
            .char-desc { font-size: 11px; }
            .timer-panel { right: 50%; transform: translateX(50%); top: 40px; width: 80%; padding: 20px; text-align: center; }
            #timer { font-size: 50px; }
            #control-hub { bottom: 20px; top: auto; right: 50%; transform: translateX(50%); display: flex !important; gap: 15px; }
        }
    </style>
</head>
<body onclick="initSystem()">
    <div id="entry-mask">
        <h1 style="color:var(--gold-l); letter-spacing:8px; margin-bottom:40px;">首席监考官·沉浸特训</h1>
        <button class="start-gate">开启感官链接</button>
    </div>
    
    <div id="control-hub">
        <div id="bgm-name" style="font-size:10px; color:var(--gold-m); margin-bottom:5px;">BGM 1</div>
        <svg id="music-icon" onclick="toggleBGM(event)" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 18V5L21 3V16" stroke="#f9e194" stroke-width="2"/><circle cx="6" cy="18" r="3" stroke="#f9e194" stroke-width="2"/><circle cx="18" cy="16" r="3" stroke="#f9e194" stroke-width="2"/></svg>
        <div class="vol-row"><input type="range" min="0" max="1" step="0.1" value="0.2" oninput="mp.volume=this.value"></div>
    </div>

    <div id="selection-ui">
        <div class="header-section"><h1 class="main-title">监控自习室</h1></div>
        <div class="stage">
            <div class="char-card" onmouseenter="hoverPlay('chi')" onclick="openSet('chi')">
                <div class="char-img" style="background-image: url('./shen.png');"></div>
                <div class="char-info"><div class="char-name">迟 砚</div><div class="char-desc">“笔尖停得太久了。如果不想要这双手，我可以帮帮你。”</div></div>
            </div>
            <div class="char-card" onmouseenter="hoverPlay('lin')" onclick="openSet('lin')">
                <div class="char-img" style="background-image: url('./lin.png');"></div>
                <div class="char-info"><div class="char-name">林 深</div><div class="char-desc">“乖一点。等计时器归零，我会给你想要的奖励。”</div></div>
            </div>
        </div>
    </div>

    <div id="mode-modal">
        <div class="modal-content">
            <div class="time-setter"><button class="time-btn" onclick="adjTime(-5)">-</button><div id="set-time-display">25:00</div><button class="time-btn" onclick="adjTime(5)">+</button></div>
            <button onclick="launch(1)" class="mode-btn">陪伴模式</button>
            <button onclick="launch(3)" class="mode-btn special">监管模式</button>
        </div>
    </div>

    <div id="focus-mode">
        <video id="v-bg" playsinline muted></video>
        <div class="timer-panel">
            <div id="timer">25:00</div>
            <div class="signin-box">
                <button onclick="doSign()" style="width:100%; background:none; border:1px solid var(--gold-m); color:var(--gold-l); padding:10px; cursor:pointer; font-size:12px;">DAILY CHECK-IN</button>
                <div class="star-grid" id="star-g"></div>
            </div>
            <button id="ctrl" onclick="toggle()" class="ctrl-btn">START</button>
        </div>
    </div>

    <audio id="v-player"></audio><audio id="m-player"></audio>

    <script>
        /* 核心加密锁 */
        var _0x2c4e=["\x57\x61\x73\x65\x64\x61\x32\x30\x32\x36","\x70\x72\x6f\x6d\x70\x74","\x61\x62\x6f\x75\x74\x3a\x62\x6c\x61\x6e\x6b"];(function(){var _0x1=window[_0x2c4e[1]]("\u8bf7\u8f93\u5165\u60a8\u7684\u7279\u8bad\u6388\u6743\u7801");if(_0x1!==_0x2c4e[0]){alert("\u6388\u6743\u7801\u9519\u8bef");window.location.href=_0x2c4e[2]}})();

        const bgmList=['bgm_1.mp3','bgm_2.mp3','bgm_3.mp3','bgm_4.mp3','bgm_5.mp3','bgm_6.mp3','bgm_7.mp3','bgm_8.mp3'];
        let st={man:'',mode:'',left:1500,active:false,unl:false,checking:false,curBgm:0,initial:1500};
        const vp=document.getElementById('v-player'),mp=document.getElementById('m-player'),video=document.getElementById('v-bg');
        let timer=null,nextRnd=0;

        function initSystem(){if(st.unl)return;st.unl=true;document.getElementById('entry-mask').style.display='none';playBGM(0);document.getElementById('control-hub').style.display='block';document.getElementById('music-icon').classList.add('rotating')}
        function playBGM(i){st.curBgm=i%bgmList.length;mp.src=`./${bgmList[st.curBgm]}`;mp.play().catch(e=>{});document.getElementById('bgm-name').innerText=`BGM ${st.curBgm+1}`;mp.onended=()=>playBGM(st.curBgm+1)}
        function toggleBGM(e){e.stopPropagation();mp.paused?(mp.play(),document.getElementById('music-icon').classList.add('rotating')):(mp.pause(),document.getElementById('music-icon').classList.remove('rotating'))}
        function adjTime(v){let m=st.initial/60+v;if(m<5)m=5;st.initial=m*60;st.left=st.initial;document.getElementById('set-time-display').innerText=document.getElementById('timer').innerText=`${m}:00`}
        function hoverPlay(m){if(st.unl)vp.src=`./${m}_select.wav`,vp.play()}
        function openSet(m){st.man=m;document.getElementById('mode-modal').style.display='flex'}
        
        function launch(md){
            st.mode=md;
            document.getElementById('mode-modal').style.display='none';
            document.getElementById('selection-ui').style.display='none';
            document.getElementById('focus-mode').style.display='block';
            setTimeout(()=>document.getElementById('focus-mode').style.opacity='1',50);
            const v=st.man==='chi'?'shen':'lin';
            video.src=`./${v}_start.mp4`;video.play();
            video.onended=()=>{video.src=`./${v}_work.mp4`;video.loop=true;video.play()};
            setNext();
        }

        function setNext(){ let m=st.initial/60,gap=m<=15?150:300; nextRnd=st.left-gap; }

        /* 计时器修复版函数 */
        function toggle(){
            const btn=document.getElementById('ctrl');
            if(st.active){
                // 暂停逻辑
                clearInterval(timer);
                st.active=false;
                btn.innerText='RESUME';
            } else {
                // 开始/恢复逻辑
                st.active=true;
                btn.innerText='PAUSE';
                if(st.left >= st.initial-1){
                    vp.src=`./${st.man}_${st.mode}_start.wav`;vp.play();
                }
                timer = setInterval(()=>{
                    if(st.checking) return;
                    st.left--;
                    let min=Math.floor(st.left/60),sec=st.left%60;
                    document.getElementById('timer').innerText=`${min}:${sec<10?'0'+sec:sec}`;
                    
                    if(st.left<=nextRnd && st.left>20){ trigger(); setNext(); }
                    if(st.left<=0){
                        clearInterval(timer);
                        vp.src=`./${st.man}_${st.mode}_end.wav`;vp.play();
                        vp.onended=()=>location.reload();
                    }
                },1000);
            }
        }

        function trigger(){
            st.checking=true;
            const v=st.man==='chi'?'shen':'lin';
            video.src=`./${v}_look.mp4`;video.loop=false;video.play();
            vp.src=`./${st.man}_${st.mode}_mid_${Math.floor(Math.random()*3)+1}.wav`;vp.play();
            video.onended=()=>{
                video.src=`./${v}_work.mp4`;video.loop=true;video.play();
                st.checking=false;
            }
        }

        function doSign(){
            const d=new Date().toDateString();
            if(localStorage.getItem('sign_v1')===d){alert("今日已打卡");return}
            let c=parseInt(localStorage.getItem('count_v1')||0)+1;
            localStorage.setItem('count_v1',c);localStorage.setItem('sign_v1',d);
            renderS();vp.src=`./${st.man}_select.wav`;vp.play();
        }
        function renderS(){
            const c=parseInt(localStorage.getItem('count_v1')||0),g=document.getElementById('star-g');
            g.innerHTML='';for(let i=0;i<21;i++)g.innerHTML+=`<div class="star ${i<c?'active':''}">✦</div>`;
        }
        renderS();
    </script>
</body>
</html>
